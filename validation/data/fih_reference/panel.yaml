panel:
  name: charon_sprint7_fih
  version: 1
  date_utc: '2026-04-23'
  route_note: |
    Sprint 11 (2026-04-24): Tier A migrated to oral route after curating
    Peff for 11 compounds (Obach 2008 / Winiwarter 1998 / Lennernäs 2007
    primary sources). This eliminates the 1/F comparison artefact Sprint 10
    identified (route_bias aggregate 42%). Tier B remains iv_bolus for
    compatibility with Sprint 7 sanity-floor tests; migration is a separate
    future sprint.
  compounds:
  - name: midazolam
    tier: gold
    reference_fih_mg: 1.0
    route: oral
    target_ceff_nM: 100.0
    source: NDA 20-942 briefing, single-dose IV Phase 1
    source_type: briefing
    notes: Conservative Phase 1 dose for IV benzodiazepine; healthy volunteers. Therapeutic sedative free
      Cp ~30-100 nM.
  - name: warfarin
    tier: gold
    reference_fih_mg: 2.0
    route: oral
    target_ceff_nM: 3200.0
    source: FDA label (Coumadin), initial dose 2-5 mg
    source_type: label_start
    notes: "Racemate starting dose floor. Therapeutic total Cp ~1-3 \u03BCg/mL, MW 308."
  - name: propranolol
    tier: gold
    reference_fih_mg: 10.0
    route: oral
    target_ceff_nM: 80.0
    source: NDA 16-418 (Inderal), approved starting dose
    source_type: label_start
    notes: Therapeutic Cp ~20 ng/mL, MW 259.
  - name: verapamil
    tier: gold
    reference_fih_mg: 40.0
    route: oral
    target_ceff_nM: 220.0
    source: NDA 18-817 (Calan), lowest approved PO dose
    source_type: label_start
    notes: Therapeutic Cp ~100 ng/mL, MW 454.
  - name: omeprazole
    tier: gold
    reference_fih_mg: 20.0
    route: oral
    target_ceff_nM: 1500.0
    source: NDA 19-810 (Prilosec), standard 20 mg PO OD
    source_type: label_start
    notes: Peak ~500 ng/mL at 20 mg, MW 345.
  - name: theophylline
    tier: gold
    reference_fih_mg: 100.0
    route: oral
    target_ceff_nM: 55000.0
    source: FDA label (Theo-24), initial PO 100-200 mg
    source_type: label_start
    notes: Therapeutic Cp ~10 ug/mL, MW 180.
  - name: diclofenac
    tier: gold
    reference_fih_mg: 50.0
    route: oral
    target_ceff_nM: 5000.0
    source: FDA Voltaren label, 50 mg PO TID initial
    source_type: label_start
    notes: Therapeutic Cp ~1.5 ug/mL, MW 296.
  - name: diazepam
    tier: gold
    reference_fih_mg: 2.0
    route: oral
    target_ceff_nM: 1800.0
    source: FDA Valium label, 2-10 mg PO initial
    source_type: label_start
    notes: Therapeutic Cp ~500 ng/mL, MW 285. Very-low fu_p (~0.013).
  - name: metoprolol
    tier: gold
    reference_fih_mg: 50.0
    route: oral
    target_ceff_nM: 380.0
    source: FDA Lopressor label, 50 mg PO BID initial
    source_type: label_start
    notes: Therapeutic Cp ~100 ng/mL, MW 267. CYP2D6 substrate.
  - name: acetaminophen
    tier: gold
    reference_fih_mg: 500.0
    route: oral
    target_ceff_nM: 66000.0
    source: FDA OTC Monograph 21 CFR 343, 325-650 mg q4-6h
    source_type: label_start
    notes: Therapeutic Cp ~10 ug/mL, MW 151. UGT-dominant elimination.
  - name: lisinopril
    tier: gold
    reference_fih_mg: 10.0
    route: oral
    target_ceff_nM: 170.0
    source: FDA Prinivil label, 5-10 mg PO OD initial
    source_type: label_start
    notes: Therapeutic Cp ~70 ng/mL, MW 405. Renal-dominant (>95% unchanged).
  - name: atorvastatin
    tier: gold
    reference_fih_mg: 10.0
    route: oral
    target_ceff_nM: 5.3
    source: FDA Lipitor label, 10 mg PO OD initial
    source_type: label_start
    notes: "Therapeutic Cp ~3 ng/mL, MW 559. CYP3A4 + OATP1B1 (transporter unmodelled \u2014 expect IVIVE\
      \ overprediction)."
  - name: theophylline
    tier: sanity_floor
    approved_starting_dose_mg: 100.0
    route: iv_bolus
    target_ceff_nM: 55000.0
    source: "FDA label, initial oral 100-200 mg; therapeutic Cp ~10 \u03BCg/mL, MW 180"
  - name: antipyrine
    tier: sanity_floor
    approved_starting_dose_mg: 500.0
    route: iv_bolus
    target_ceff_nM: 50000.0
    source: "Historical analgesic; commonly 500 mg PO adult; Cp ~9 \u03BCg/mL, MW 188"
  - name: caffeine
    tier: sanity_floor
    approved_starting_dose_mg: 100.0
    route: iv_bolus
    target_ceff_nM: 25000.0
    source: "OTC monograph, 100-200 mg typical; Cp ~5 \u03BCg/mL, MW 194"
  - name: warfarin
    tier: sanity_floor
    approved_starting_dose_mg: 5.0
    route: iv_bolus
    target_ceff_nM: 3200.0
    source: FDA label, upper bound of starting range
  - name: diclofenac
    tier: sanity_floor
    approved_starting_dose_mg: 50.0
    route: iv_bolus
    target_ceff_nM: 5000.0
    source: "FDA label (Voltaren), 50 mg PO TID; Cp ~1.5 \u03BCg/mL, MW 296"
  - name: midazolam
    tier: sanity_floor
    approved_starting_dose_mg: 2.5
    route: iv_bolus
    target_ceff_nM: 100.0
    source: Conservative anaesthetic pre-med IV
  - name: propranolol
    tier: sanity_floor
    approved_starting_dose_mg: 40.0
    route: iv_bolus
    target_ceff_nM: 80.0
    source: FDA label, upper initial PO
  - name: diazepam
    tier: sanity_floor
    approved_starting_dose_mg: 2.0
    route: iv_bolus
    target_ceff_nM: 1800.0
    source: FDA label (Valium), 2-10 mg initial; therapeutic Cp ~500 ng/mL, MW 285
  - name: metoprolol
    tier: sanity_floor
    approved_starting_dose_mg: 50.0
    route: iv_bolus
    target_ceff_nM: 380.0
    source: FDA label (Lopressor), 50 mg PO BID initial; Cp ~100 ng/mL, MW 267
  - name: verapamil
    tier: sanity_floor
    approved_starting_dose_mg: 80.0
    route: iv_bolus
    target_ceff_nM: 220.0
    source: FDA label (Calan), 80 mg PO TID standard
  - name: omeprazole
    tier: sanity_floor
    approved_starting_dose_mg: 20.0
    route: iv_bolus
    target_ceff_nM: 1500.0
    source: FDA label (Prilosec), 20 mg PO OD standard
  - name: dextromethorphan
    tier: sanity_floor
    approved_starting_dose_mg: 30.0
    route: iv_bolus
    target_ceff_nM: 30.0
    source: OTC antitussive, 30 mg PO q6-8h; Cp ~8 ng/mL, MW 271
