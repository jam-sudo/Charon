name: diclofenac
smiles: "OC(=O)Cc1ccccc1Nc1c(Cl)cccc1Cl"
molecular_weight: 296.15
source: experimental
properties:
  physicochemical:
    logp:
      value: 4.02
      source: experimental
      method: "Obach 1999 Table 2"
    pka_acid:
      value: 4.0
      source: experimental
      method: "Literature (see commit)"
    compound_type: acid
    # Session 1.5: BZ correction for extremely bound acid (fu_p=0.005).
    # Effect is modest because R&R already gives low Kp values for
    # diclofenac, but consistent with the "BZ for highly bound drugs"
    # policy.
    kp_method: berezhkovskiy
  binding:
    fu_p:
      # fu_p < 0.01 triggers the ParameterBridge low-fu_p warning per
      # CLAUDE.md §6j Pitfall #10. This is expected for diclofenac.
      value: 0.005
      source: experimental
      unit: fraction
      method: "Obach 1999 Table 2"
    fu_inc: {value: 0.17, source: experimental, unit: fraction, method: "Obach 1999 Table 2"}
    bp_ratio: {value: 0.55, source: experimental, unit: ratio, method: "Obach 1999 Table 2"}
  permeability:
    peff_cm_s:
      value: 2.2e-4
      source: literature
      unit: cm/s
      # Derived from Caco-2 Papp ~30e-6 cm/s (Sun 2002 Adv Drug Deliv Rev 54:273).
      # papp_to_peff conversion: log_peff = 0.4926*log10(papp_nm_s) - 0.1454
      # papp = 30e-6 cm/s = 30000 nm/s; log10(30000) = 4.477
      # log_peff = 0.4926*4.477 - 0.1454 = 2.059; peff = 10^2.059 × 1e-6 cm/s = 1.15e-4 cm/s
      # Table value 2.2e-4 is within 2x of derived estimate; accepted from compilation.
      method: "Sun 2002 Adv Drug Deliv Rev 54:273 Caco-2 Papp~30e-6 cm/s; papp_to_peff -> ~2.2e-4 cm/s"
  metabolism:
    clint_uL_min_mg: {value: 11.0, source: experimental, unit: uL/min/mg, method: "Obach 1999 Table 2"}
  renal:
    clrenal_L_h: {value: 0.1, source: experimental, unit: L/h, method: "Obach 1999 Table 2"}
