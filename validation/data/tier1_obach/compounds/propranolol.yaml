name: propranolol
smiles: "CC(C)NCC(O)COc1cccc2ccccc12"
molecular_weight: 259.34
source: experimental
properties:
  physicochemical:
    logp:
      value: 3.48
      source: experimental
      method: "Obach 1999 Table 2"
    pka_base:
      value: 9.5
      source: experimental
      method: "Literature (see commit)"
    compound_type: base
  binding:
    fu_p: {value: 0.13, source: experimental, unit: fraction, method: "Obach 1999 Table 2"}
    fu_inc: {value: 0.96, source: experimental, unit: fraction, method: "Obach 1999 Table 2"}
    bp_ratio: {value: 0.80, source: experimental, unit: ratio, method: "Obach 1999 Table 2"}
  permeability:
    peff_cm_s:
      value: 2.9e-4
      source: literature
      unit: cm/s
      # Lennernas 1997 (J Pharm Pharmacol 49:627) reports mean Peff 3.59±1.60e-4 cm/s
      # by jejunal perfusion (Loc-I-Gut). Table value 2.9e-4 is within 1.24-fold of
      # the reported mean, well within the ±1SD range. Accepted as consistent.
      method: "Winiwarter 1998 J Med Chem 41:4939; confirmed by Lennernas 1997 J Pharm Pharmacol 49:627 (mean 3.59e-4 ± 1.60e-4)"
  metabolism:
    clint_uL_min_mg: {value: 13.6, source: experimental, unit: uL/min/mg, method: "Obach 1999 Table 2"}
  renal:
    clrenal_L_h: {value: 0.1, source: experimental, unit: L/h, method: "Obach 1999 Table 2"}
  distribution:
    # Phase 2 (Sprint 3b Task 17): empirical adipose Kp override with
    # verified primary citation.  Roberts 2000 reports propranolol
    # partition coefficients from isolated perfused rat hindlimb:
    # fat=6.36, muscle=2.79, skin=2.64.  Secondary of ≥2 verified
    # overrides required by DoD §2.
    empirical_kp_by_tissue:
      adipose:
        value: 6.36
        source: literature
        unit: ratio
        method: "Roberts MS, Wu Z, Weiss M. Eur J Pharm Sci 2000;11(2):165-172 — rat isolated perfused hindlimb Kp_fat"
