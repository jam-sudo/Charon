name: midazolam
smiles: "Cc1ncc2n1-c1ccc(Cl)cc1C(c1ccccc1F)=NC2"
molecular_weight: 325.77
source: experimental
properties:
  physicochemical:
    logp:
      value: 3.89
      source: experimental
      method: "Obach 1999 Table 2"
    pka_base:
      value: 6.2
      source: experimental
      method: "Literature (see commit)"
    # Sprint 3a convention: explicit 'base' override because
    # infer_compound_type default threshold pKa_base>8.0 would classify
    # midazolam (pKa_base=6.2) as neutral. Keep in sync with
    # tests/unit/test_pipeline.py::TestPipelineMidazolamLimitation.
    compound_type: base
  binding:
    fu_p: {value: 0.03, source: experimental, unit: fraction, method: "Obach 1999 Table 2"}
    fu_inc: {value: 0.96, source: experimental, unit: fraction, method: "Obach 1999 Table 2"}
    bp_ratio: {value: 0.66, source: experimental, unit: ratio, method: "Obach 1999 Table 2"}
  metabolism:
    clint_uL_min_mg: {value: 93.0, source: experimental, unit: uL/min/mg, method: "Obach 1999 Table 2"}
  renal:
    clrenal_L_h: {value: 0.0, source: experimental, unit: L/h, method: "Obach 1999 Table 2"}
  distribution:
    # Phase 2 (Sprint 3b Task 16): empirical adipose Kp override with
    # verified primary citation.  Björkman 1996 reports rat experimental
    # tissue Kp values for midazolam; adipose Kp = 9.0 vs R&R-predicted
    # ~50 (capped).  This is the canonical "R&R overpredicts adipose for
    # lipophilic weak bases" fix described in the spec §4.4 Phase 2.
    empirical_kp_by_tissue:
      adipose:
        value: 9.0
        source: literature
        unit: ratio
        method: "Björkman S, J Pharm Sci 1996;85(8):887-889 — rat experimental Kp_adipose"
