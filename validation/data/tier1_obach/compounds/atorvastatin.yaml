# Sprint 9 additions — atorvastatin (CYP3A4 + OATP1B1 substrate).
#
# Eliminated mainly by CYP3A4; hepatic uptake is OATP1B1-mediated (not
# modelled in Charon). The compound is included as an honest stress
# test — expected IVIVE overprediction due to missing transporter layer,
# flagged in notes so the Tier A fold-error reading is interpreted
# correctly.
#
# Primary references:
#   - Obach 2008 human PK (CL = 39 L/h, Vss = 381 L)
#   - Lennernäs 2003 (transporter review)
#   - FDA Lipitor label (10 mg PO starting dose)
name: atorvastatin
smiles: "CC(C)c1c(C(=O)Nc2ccccc2)c(-c2ccccc2)c(-c2ccc(F)cc2)n1CC[C@@H](O)C[C@@H](O)CC(=O)O"
molecular_weight: 558.64
source: experimental
properties:
  physicochemical:
    logp:
      value: 6.36
      source: experimental
      method: "DrugBank DB01076"
    compound_type: acid
    pka_acid:
      value: 4.46
      source: experimental
      method: "DrugBank DB01076"
  binding:
    fu_p: {value: 0.02, source: experimental, unit: fraction, method: "Lennernäs 2003"}
    fu_inc: {value: 0.07, source: experimental, unit: fraction, method: "Austin 2002 (HLM)"}
    bp_ratio: {value: 0.61, source: experimental, unit: ratio, method: "Lennernäs 2003"}
  permeability:
    peff_cm_s:
      value: 0.45e-4
      source: literature
      unit: cm/s
      # CONFIDENCE: LOW. Atorvastatin shows low passive permeability; hepatic
      # uptake is dominated by OATP1B1 (not modelled in Charon ACAT). Caco-2
      # studies show Pgp-mediated efflux reducing net apical-to-basal flux.
      # Wu 2000 (cited in task spec) and Lennernas 2003 transporter review
      # describe low passive Peff. The 0.45e-4 value is consistent with the
      # atenolol BCS reference drug at 0.45e-4 cm/s (median jejunum).
      # Note: simulation will underpredict oral F due to missing OATP1B1 uptake.
      method: "Wu & Benet 2000 Drug Metab Dispos 28:751 / Lennernas 2003 Clin Pharmacokinet 42:419; passive Peff compilation; compare atenolol reference 0.45e-4 cm/s"
  metabolism:
    clint_uL_min_mg: {value: 128.0, source: experimental, unit: uL/min/mg, method: "Obach 2008 HLM"}
    # Sprint 12: OATP1B1 hepatic uptake enhancement.
    # Passive IVIVE (HLM CLint) under-predicts in vivo CLh for OATP substrates
    # because active uptake into hepatocyte is rate-limiting. Multiplier
    # derived from literature in vivo/in vitro CLint_u ratios for OATP1B1
    # substrates (hepatic uptake clearance IVIVE gap for statins). Atorvastatin
    # CLint is dominated by OATP1B1/1B3-mediated uptake; passive IVIVE alone
    # systematically under-predicts in vivo CL by ~5-12x (Barton 2013 /
    # Izumi 2018 compilation). Value 8.0 = midpoint of 5-12x literature range.
    hepatic_clint_multiplier:
      value: 8.0
      source: literature
      unit: ratio
      method: "Barton 2013 Pharm Res 30:1077 / Izumi 2018 Drug Metab Pharmacokinet 33(2):57 — in vivo/in vitro CLint_u ratio for OATP1B1 substrates 5-12x; 8.0 = midpoint of literature range"
  renal:
    clrenal_L_h: {value: 0.0, source: experimental, unit: L/h, method: "Lennernäs 2003 (<2% renal)"}
