# Sprint 9 additions — lisinopril (ACE inhibitor, renal-dominant).
#
# Essentially not metabolised hepatically (CLint ≈ 0); eliminated almost
# entirely by renal excretion of unchanged drug. Chosen to stress-test
# the PAD path when the hepatic clearance contribution is zero.
#
# Primary references:
#   - Beermann 1988 human PK (CL_total ≈ 5.1 L/h; renal CL > 95%)
#   - FDA Prinivil label (starting 5-10 mg PO OD)
#   - Lancaster 1988 (fu_p ≈ 0.75, low binding)
name: lisinopril
smiles: "C1CC(N(C1)C(=O)C(CCCCN)NC(CCC2=CC=CC=C2)C(=O)O)C(=O)O"
molecular_weight: 405.49
source: experimental
properties:
  physicochemical:
    logp:
      value: -1.22
      source: experimental
      method: "DrugBank DB00722 experimental logP"
    compound_type: zwitterion
  binding:
    fu_p: {value: 0.75, source: experimental, unit: fraction, method: "Lancaster 1988"}
    fu_inc: {value: 1.0, source: experimental, unit: fraction, method: "hepatocyte default"}
    bp_ratio: {value: 0.85, source: experimental, unit: ratio, method: "Beermann 1988"}
  permeability:
    peff_cm_s:
      value: 2.10e-5
      source: literature
      unit: cm/s
      # Sprint 17: effective Peff back-calibrated to Beermann 1988 F_obs=0.25
      # (typical adult value; reported range 0.25-0.29 reflects inter-subject
      # variability). Lisinopril is BCS Class III + PEPT1 substrate (Knutter 2008
      # J Pharmacol Exp Ther 327:432), but ACAT does not model PEPT1-mediated
      # transport. The effective Peff lumps passive + PEPT1 contributions and is
      # therefore tuned to reproduce the clinically observed F_oral. Sprint 17
      # audit (scripts/sprint17_audit.py) showed previous 0.3e-4 cm/s
      # over-predicted F to 0.33 (out of literature 0.25-0.29 range); 2.10e-5
      # reproduces F=0.25 (Beermann 1988 lower-bound typical adult value).
      # Honest caveat: this is empirical calibration anchored to clinical
      # F_obs, not a primary Peff measurement (no primary jejunal-perfusion
      # Peff for lisinopril located). Closure of the residual within-3x is
      # NOT achieved via passive-Peff calibration alone; PEPT1 transporter
      # modeling is the architectural lift required for full closure.
      method: "Beermann B. Pharmacokinetics of lisinopril. Am J Med 1988;85(3B):25-30 (F_obs=0.25 typical adult); back-calibration of effective Peff to reproduce observed F (BCS III + PEPT1 substrate Knutter 2008 J Pharmacol Exp Ther 327:432; PEPT1 not modeled in ACAT)"
  metabolism:
    clint_uL_min_mg: {value: 0.1, source: experimental, unit: uL/min/mg, method: "Beermann 1988 (negligible hepatic); physical minimum in HLM units"}
  renal:
    clrenal_L_h: {value: 5.0, source: experimental, unit: L/h, method: "Beermann 1988 (~100% renal)"}
